<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SpinePRO Joint‑CAT</title>
  <link rel="icon" href="/favicon.ico"/>
  <link rel="stylesheet" href="/assets/app.css"/>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div>
          <h1>SpinePRO Joint‑CAT</h1>
          <div class="subtitle">Adaptive: PROMIS + SRS items in one engine (multidomain prototype).</div>
          <div class="pills">
            <span class="pill" id="statusPill">Loading…</span>
            <span class="pill" id="countPill">0 items</span>
            <span class="pill" id="domainPill">Domain: —</span>
          </div>
        </div>
        <div class="btnRow">
          <button class="btn" id="restartBtn">Restart</button>
          <button class="btn primary" id="finishBtn">Finish</button>
        </div>
      </div>

      <div class="progress"><div id="progressBar"></div></div>

      <div class="question" id="questionText">Loading…</div>
      <div class="choices" id="choices"></div>

      <div class="footerRow">
        <div>
          Posterior SD: <b id="sdText">—</b> &nbsp;&nbsp; Current theta: <b id="thetaText">—</b>
        </div>
        <div class="badge" id="ruleText">Rule: content‑balance → uncertainty (IRT)</div>
      </div>

      <div class="note" id="note">
        Prototype note: parameters must be calibrated on real PROMIS+SRS joint data for clinical use.
      </div>
    </div>
  </div>

  <script type="module" src="/assets/jointcat_mdc.js"></script>
</body>
</html>
