<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SpinePRO Joint‑CAT</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#f3f6fb;margin:0;padding:24px;}
    .card{max-width:1100px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.06);padding:24px;}
    h1{margin:0 0 6px 0;font-size:38px;}
    .sub{color:#4b5563;margin:0 0 18px 0;}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:none;border-radius:999px;padding:12px 18px;font-weight:900;cursor:pointer}
    .btn.primary{background:#2563eb;color:#fff}
    .btn.secondary{background:#111827;color:#fff}
    .note{color:#6b7280;font-size:12px;margin-top:14px}
  </style>
</head>
<body>
  <div class="card">
    <h1>SpinePRO Joint‑CAT</h1>
    <p class="sub">Integrated PROMIS + SRS adaptive questionnaire (synthetic‑calibrated prototype).</p>
    <div class="actions">
      <button class="btn primary" onclick="location.href='./survey_joint.html'">Start survey</button>
      <button class="btn secondary" onclick="location.href='./results_joint.html'">View results</button>
    </div>
    <p class="note">Prototype only — not a validated clinical instrument. Intended for internal testing while you finalize calibration, crosswalks, and validation.</p>
  </div>
</body>
</html>
